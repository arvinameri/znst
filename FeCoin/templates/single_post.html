{% load static %}
<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ post.title }} | ZNST</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Vazirmatn:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* --- RESET BASIC --- */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #050b14; /* رنگ پس زمینه تیره */
        color: #ffffff;
        font-family: "Poppins", sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding-bottom: 50px;
        overflow-x: hidden;
      }

      /* --- VIDEO BACKGROUND --- */
      #background-video {
        position: fixed;
        right: 0;
        bottom: 0;
        min-width: 100%;
        min-height: 100%;
        width: auto;
        height: auto;
        z-index: -2;
        object-fit: cover;
      }
      .video-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle at center,
          rgba(5, 11, 20, 0.75) 0%,
          #050b14 95%
        );
        z-index: -1;
        backdrop-filter: blur(5px);
      }

      /* --- CONTAINER & GLASS EFFECT --- */
      .app-container {
        width: 100%;
        max-width: 900px;
        padding: 20px;
        margin-top: 40px; /* فاصله از بالا */
        z-index: 10;
        position: relative;
      }

      .glass-panel {
        background: rgba(16, 24, 39, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }

      /* --- POST STYLES --- */
      .back-btn {
        display: inline-block;
        margin-bottom: 25px;
        color: #94a3b8;
        text-decoration: none;
        font-weight: 600;
        background: rgba(255, 255, 255, 0.05);
        padding: 8px 16px;
        border-radius: 50px;
        transition: 0.3s;
        font-size: 0.9rem;
      }
      .back-btn:hover {
        background: rgba(0, 255, 163, 0.1);
        color: #00ffa3;
      }

      .post-header-img {
        width: 100%;
        height: 350px;
        object-fit: cover;
        border-radius: 16px;
        margin-bottom: 30px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .post-title {
        font-size: 2.2rem;
        font-weight: 800;
        color: #fff;
        margin-bottom: 15px;
        line-height: 1.3;
        text-shadow: 0 0 15px rgba(0, 255, 163, 0.2);
      }

      .post-meta {
        display: flex;
        gap: 15px;
        color: #00ffa3;
        font-size: 0.9rem;
        margin-bottom: 30px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 20px;
      }

      .post-content {
        color: #e2e8f0;
        line-height: 1.8;
        font-size: 1.1rem;
      }
      .post-content h2 {
        color: #fff;
        margin-top: 30px;
        margin-bottom: 15px;
        font-size: 1.5rem;
      }
      .post-content p {
        margin-bottom: 20px;
      }
      .post-content img {
        max-width: 100%;
        border-radius: 12px;
        margin: 20px 0;
      }
      .post-content a {
        color: #00ffa3;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .glass-panel {
          padding: 25px;
        }
        .post-title {
          font-size: 1.8rem;
        }
        .post-header-img {
          height: 250px;
        }
      }
    </style>
  </head>
  <body>
    <video autoplay muted loop playsinline id="background-video">
      <source src="{% static 'videofe.mp4' %}" type="video/mp4" />
    </video>
    <div class="video-overlay"></div>

    <div class="app-container">
      <div class="glass-panel single-post-container">
        <a href="/blog" class="back-btn">← Back to Blog</a>

        {% if post.get_image_url %}
        <img
          src="{{ post.get_image_url }}"
          alt="{{ post.title }}"
          class="post-header-img"
        />
        {% endif %}

        <h1 class="post-title">{{ post.title }}</h1>

        <div class="post-meta">
          <span>📅 {{ post.publish_at|date:"F d, Y" }}</span>
          {% if post.author %}
          <span>✍️ {{ post.author.username }}</span>
          {% endif %}
        </div>

        <div class="post-content">{{ post.content|safe }}</div>
      </div>
    </div>
  </body>
</html>
